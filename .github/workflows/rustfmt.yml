name: Rustfmt

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:

  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Install Rust
        uses: actions-rs/toolchain@master
        with:
          toolchain: stable
          override: true
          profile: minimal
          components: rustfmt
      - name: Check formatting
        run: |
          cargo fmt --all -- --check
